<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PitchForge 调试页面</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #f5f5f5; }
    .log { background: white; padding: 10px; margin: 10px 0; border-left: 3px solid #4F46E5; }
    .error { border-left-color: #EF4444; color: red; }
    .success { border-left-color: #10B981; color: green; }
    button { padding: 10px 20px; background: #4F46E5; color: white; border: none; cursor: pointer; margin: 5px; }
    textarea { width: 100%; height: 100px; margin: 10px 0; }
    #output { background: white; padding: 15px; margin: 10px 0; white-space: pre-wrap; min-height: 200px; }
  </style>
</head>
<body>
  <h1>PitchForge 调试页面</h1>
  
  <textarea id="input">我想做一个面向黑客松参与者的AI路演助手</textarea>
  
  <div>
    <button onclick="testAPI()">测试 API</button>
    <button onclick="testUtils()">测试 Utils</button>
    <button onclick="clearLogs()">清除日志</button>
  </div>
  
  <div id="logs"></div>
  
  <h3>API 响应:</h3>
  <div id="output"></div>

  <script>
    function log(msg, type = 'info') {
      const div = document.createElement('div');
      div.className = `log ${type}`;
      div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      document.getElementById('logs').prepend(div);
    }

    function clearLogs() {
      document.getElementById('logs').innerHTML = '';
      document.getElementById('output').textContent = '';
    }

    async function testAPI() {
      log('开始测试 API...', 'info');
      
      try {
        // 测试 1: 检查 PitchForgeAPI 是否存在
        if (typeof PitchForgeAPI === 'undefined') {
          log('❌ PitchForgeAPI 未定义！', 'error');
          log('请检查 api.js 是否正确加载', 'error');
          return;
        }
        log('✅ PitchForgeAPI 已加载', 'success');

        // 测试 2: 调用 API
        log('调用 generatePitch...', 'info');
        const result = await PitchForgeAPI.generatePitch({
          project_idea: document.getElementById('input').value,
          pitch_duration: '1 分钟'
        });

        if (result.success) {
          log('✅ API 调用成功！', 'success');
          document.getElementById('output').textContent = result.data.result;
        } else {
          log(`❌ API 调用失败: ${result.error.message}`, 'error');
        }
      } catch (err) {
        log(`❌ 异常: ${err.message}`, 'error');
        console.error(err);
      }
    }

    function testUtils() {
      log('开始测试 Utils...', 'info');
      
      if (typeof PitchForgeUtils === 'undefined') {
        log('❌ PitchForgeUtils 未定义！', 'error');
        log('请检查 utils.js 是否正确加载', 'error');
        return;
      }
      log('✅ PitchForgeUtils 已加载', 'success');
      log('可用方法: ' + Object.keys(PitchForgeUtils).join(', '), 'success');
    }

    // 页面加载时自动测试
    window.addEventListener('DOMContentLoaded', () => {
      log('页面加载完成', 'info');
      log('检查全局对象...', 'info');
      
      if (typeof PitchForgeAPI !== 'undefined') {
        log('✅ PitchForgeAPI 存在', 'success');
      } else {
        log('❌ PitchForgeAPI 不存在', 'error');
      }
      
      if (typeof PitchForgeUtils !== 'undefined') {
        log('✅ PitchForgeUtils 存在', 'success');
      } else {
        log('❌ PitchForgeUtils 不存在', 'error');
      }
    });
  </script>

  <!-- 加载实际文件 -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
</body>
</html>
